name: tests

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      QT_QPA_PLATFORM: offscreen
      PYTHONIOENCODING: utf-8
      PYTHONUTF8: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Run checks
        shell: pwsh
        run: |
          python tools/run_checks.py *> run_checks.log
          $status = $LASTEXITCODE
          Get-Content run_checks.log
          exit $status

      - name: Prepare run check log artifact name
        if: always()
        shell: pwsh
        run: |
          $name = "run-checks-log"
          if (Test-Path run_checks.log) {
            $raw = Get-Content run_checks.log -Raw
            $clean = (($raw -replace '\s+', ' ') -replace '[^A-Za-z0-9_. -]', '_').Trim()
            if ($clean.Length -gt 180) {
              $clean = $clean.Substring($clean.Length - 180, 180)
            }
            if ($clean) {
              $name = "run-checks-log-$clean"
            }
          }
          "RUN_CHECKS_ARTIFACT_NAME=$name" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload run check log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.RUN_CHECKS_ARTIFACT_NAME }}
          path: run_checks.log
          if-no-files-found: ignore
